// 芒聰聙芒聰聙 State 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
let activeTab = 0;
let activeDay = 0;

// 芒聰聙芒聰聙 Render day panels 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderDays() {
  const container = document.getElementById('day-panels');
  container.innerHTML = '';

  DAYS.forEach(day => {
    const panel = document.createElement('div');
    panel.id = `day-${day.index}`;
    panel.style.display = day.index === 0 ? 'block' : 'none';
    panel.className = 'fade-up';

    // Day header card
    panel.innerHTML = `
      <div class="rounded-2xl p-4 mb-5" style="background:${day.accentBg}; border:1px solid ${day.accent}22;">
        <div class="flex items-start justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color:${day.accent};">
              Ziua ${day.index + 1}
            </p>
            <h2 class="text-xl font-black leading-tight" style="font-family:'Playfair Display',serif; color:#F0F0F0;">
              ${day.title}
            </h2>
            <p class="text-xs mt-1" style="color:#666;">${day.subtitle}</p>
          </div>
        </div>
        <div class="mt-3 inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold"
             style="background:#0A0A0A; color:${day.accent}; border:1px solid ${day.accent}33;">
          ${day.transport}
        </div>
      </div>

      <!-- Timeline -->
      <div class="flex flex-col gap-0">
        ${day.activities.map((act, i) => `
          <div class="flex gap-3 ${i < day.activities.length - 1 ? 'mb-4' : ''}">
            <!-- icon + line -->
            <div class="flex flex-col items-center flex-shrink-0" style="width:32px;">
              <div class="w-8 h-8 rounded-xl flex items-center justify-center text-base flex-shrink-0"
                   style="background:${day.accentBg}; border:1px solid ${day.accent}33;">
                ${act.icon}
              </div>
              ${i < day.activities.length - 1 ? `
                <div class="w-px flex-1 mt-1" style="background:#1E1E1E; min-height:20px;"></div>
              ` : ''}
            </div>
            <!-- content -->
            <div class="flex-1 pb-1">
              <span class="text-[11px] font-bold tabular-nums" style="color:${day.accent};">${act.time}</span>
              <h4 class="text-sm font-bold mt-0.5 mb-1" style="color:#F0F0F0;">${act.title}</h4>
              <p class="text-xs leading-relaxed" style="color:#666;">${act.desc}</p>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    container.appendChild(panel);
  });
}

// 芒聰聙芒聰聙 Switch tab 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function switchTab(index) {
  // hide all
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(`tab-${index}`).classList.remove('hidden');

  // update buttons
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`tb-${i}`);
    if (i === index) {
      btn.style.background = '#F0F0F0';
      btn.style.color = '#0A0A0A';
    } else {
      btn.style.background = '#1A1A1A';
      btn.style.color = '#555';
    }
  }
  activeTab = index;
}

// 芒聰聙芒聰聙 Show day 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function showDay(index) {
  const day = DAYS[index];

  // hide all panels
  DAYS.forEach(d => {
    const el = document.getElementById(`day-${d.index}`);
    if (el) el.style.display = 'none';
  });

  // show selected
  const panel = document.getElementById(`day-${index}`);
  if (panel) {
    panel.style.display = 'block';
    panel.classList.remove('fade-up');
    void panel.offsetWidth; // reflow
    panel.classList.add('fade-up');
  }

  // update day buttons
  for (let i = 0; i < 7; i++) {
    const btn = document.getElementById(`db-${i}`);
    if (!btn) continue;
    if (i === index) {
      btn.style.background = day.accent;
      btn.style.borderColor = day.accent;
      btn.style.color = '#fff';
      btn.classList.add('active');
    } else {
      btn.style.background = '#141414';
      btn.style.borderColor = '#2A2A2A';
      btn.style.color = '#555';
      btn.classList.remove('active');
    }
  }
  activeDay = index;
}
